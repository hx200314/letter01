<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>100天</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: black;
  font-family: "PingFang SC","Microsoft YaHei",sans-serif;
  color: white;
  overflow-x: hidden;
}

/* 星空 */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* 开场 */
#intro {
  position: fixed;
  width: 100%;
  top: 45%;
  text-align: center;
  font-size: 20px;
  opacity: 0;
  z-index: 2;
}

/* 信件 */
#letter {
  position: relative;
  width: 88%;
  margin: 120px auto;
  line-height: 2;
  font-size: 16px;
  white-space: pre-wrap;
  display: none;
  z-index: 2;
}

/* 结尾 */
#final {
  position: fixed;
  width: 100%;
  top: 50%;
  text-align: center;
  font-size: 34px;
  opacity: 0;
  transform: scale(0.3);
  z-index: 3;
}

/* 爱心 */
.heart {
  position: fixed;
  font-size: 18px;
  animation: float 1s linear forwards;
  pointer-events: none;
}

@keyframes float {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-120px); opacity: 0; }
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div id="intro">我们已经一起走过100天</div>
<div id="letter"></div>
<div id="final">崔钰浩❤️我爱你</div>

<!-- 🎵 音频 -->
<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* ⭐ 星空（轻量移动端版） */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let stars = [];
for (let i = 0; i < 80; i++) {
  stars.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    z: Math.random() * window.innerWidth
  });
}

function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  for (let s of stars) {
    s.z -= 0.4;
    if (s.z <= 0) s.z = canvas.width;

    let k = 120 / s.z;
    let x = s.x * k + canvas.width / 2;
    let y = s.y * k + canvas.height / 2;

    ctx.fillStyle = "white";
    ctx.fillRect(x, y, 1.5, 1.5);
  }

  requestAnimationFrame(draw);
}
draw();

/* ⭐ 开场 */
setTimeout(() => intro.style.opacity = 1, 800);
setTimeout(() => intro.style.opacity = 0, 3500);


/* 💌 原文（完全未改） */
let text = `亲爱的崔钰浩：

不敢相信今天竟然是我们的100天。时间如此之快，恍惚间又回到我问你要不要跟我在一起的那天——我的心在南非盛夏的水汽里氤氲，在离开埃及的飞机上颠簸与期待。那时的我天真地以为马上就能见到你，谁曾想命运弄人，我还没准备好见你，就又沿着既定的轨迹只身飞去了东南亚。只能在离去前一晚写下信笺，将我的思念轻轻埋藏。

这里的海风和南非没什么两样，同样燥热，人心似火。我感受着不同的文化、不同的风俗、不同的语言、不同的笑容。

年节时候，国内万家灯火，热闹团圆。远在异国他乡，我只捂着这一颗心悄悄思念你。我想给你写长长的文字——不止是文字长长，思念也赘了满篇。我给你写异乡的月亮，那么残忍，竟也和书中描写的一样，将游人的乡愁慢慢撕碎；写异乡的食物，那么熟悉，却又永远差那一种味道，独属于所谓家的味道。我还要写异乡的我，浅淡欢笑，心像缺了一角，跨越千里找寻你去。

一百天，足以证明很多事情。它的跨度可以让诺言褪色，可以让人心改变，但同样，它也让感情坚定者更加坚定其心。幸运的是，我遇到了你，命中注定我爱上了你。我开始变得在意——在意这个女孩的一举一动、一颦一笑，更加在意在她眼中是否也同样有我的身影留存。我想感谢你，包容我的缺点，肯定我的优点，带给我那么多从未感受过的体验和心情。你是一个很好的女孩，就这样一直蹦蹦跳跳、开心地走下去吧。

亲爱的一百天快乐。我们未来会度过很多个一百天。未来的每一天，我只想和你在一起。我想以后让你不再等待，让你时刻见到我；想和你一起看世界，亲自去丈量不同的土地和海滩。我要让你感到幸福，感到爱。`;

let i = 0;

function typing() {
  letter.style.display = "block";

  if (i < text.length) {
    letter.innerHTML += text[i];

    /* 📱 平滑慢滚动 */
    window.scrollBy({
      top: 0.6,
      behavior: "smooth"
    });

    let speed = 40;

    if (text[i] === "，") speed = 120;
    if (text[i] === "。") speed = 180;
    if (text[i] === "——") speed = 260;

    i++;
    setTimeout(typing, speed);
  } else {
    showFinal();
  }
}

setTimeout(typing, 5000);


/* ❤️ 手机触摸爱心 */
document.body.addEventListener("touchstart", function(e) {
  let t = e.touches[0];

  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = t.clientX + "px";
  heart.style.top = t.clientY + "px";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 1000);
});


/* 💥 结尾 */
function showFinal() {
  setTimeout(() => {
    final.style.opacity = 1;
    final.style.transform = "scale(1.4)";
  }, 1200);
}


/* 🎵 音频强制修复（手机关键） */
function startMusic() {
  let audio = document.getElementById("bgm");

  audio.play().catch(() => {
    console.log("blocked, waiting user gesture");
  });
}

/* 三重保险触发 */
document.addEventListener("touchstart", startMusic, { once: true });
document.addEventListener("click", startMusic, { once: true });
window.addEventListener("load", () => {
  let audio = document.getElementById("bgm");
  audio.load();
});

</script>

</body>
</html>
